name: online_store
description: "A Flutter online store app with Clean Architecture."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.20.2

  # Preview the app on different device frames during development
  device_preview: ^1.2.0

  # Masonry/staggered grid layout for product cards
  flutter_staggered_grid_view: ^0.7.0

  # Render SVG images inside Flutter
  flutter_svg: ^2.0.10

  # State management
  flutter_bloc: ^9.1.1

  # Local database
  sqflite: ^2.4.2
  sqflite_common_ffi: ^2.3.4+4
  path: ^1.9.1
  path_provider: ^2.1.5

  # Persistent key-value storage
  shared_preferences: ^2.5.3

  # HTTP client
  dio: ^5.7.0

  # Image caching
  cached_network_image: ^3.4.1

  # Dependency injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Value equality
  equatable: ^2.0.7

  # Google Fonts
  google_fonts: ^6.2.1

  # Credit card UI widget
  flutter_credit_card: ^4.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  injectable_generator: ^2.7.0
  build_runner: ^2.4.15

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
